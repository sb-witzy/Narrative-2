# Pre-built images from GitHub Container Registry.
# Usage:
#   1. Set these two vars in your .env:
#        GHCR_OWNER=your-github-username   # lower-case
#        IMAGE_TAG=latest                  # or 1.2.3, sha-abc1234, etc.
#   2. docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
#   3. docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d
#
# The `image:` here overrides the `build:` in the base compose file, so no
# local build step is required. Skips ~5 min of first-time build.

services:
  backend:
    image: ghcr.io/${GHCR_OWNER}/narrative-rx-backend:${IMAGE_TAG:-latest}

  frontend:
    image: ghcr.io/${GHCR_OWNER}/narrative-rx-frontend:${IMAGE_TAG:-latest}
